<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analyzer | Intelligent Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script>
        window.DEFAULT_MODEL = "{{ default_model }}";
        window.DEFAULT_SENSENOVA_MODEL = "{{ sensenova_default_model }}";
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Video Analyzer</h1>
            <p class="subtitle">Extract intelligent narratives from your video content</p>
        </header>

        <main>
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="upload-area" id="dropZone">
                    <input type="file" id="fileInput" accept=".mp4,.avi,.mov,.mkv" hidden>
                    <div class="upload-content">
                        <svg class="upload-icon" viewBox="0 0 24 24">
                            <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                        </svg>
                        <p>Drop your video here or click to browse</p>
                        <p class="upload-formats">MP4, AVI, MOV, MKV</p>
                    </div>
                </div>
            </section>

            <!-- Configuration Section -->
            <section class="config-section" id="configSection" style="display: none;">
                <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">Configuration</h2>
                <form id="analysisForm">
                    <div class="grid-form">
                        <!-- Client Configuration -->
                        <div class="form-group">
                            <label for="client">Service Provider</label>
                            <select id="client" name="client">
                                <option value="modelscope">ModelScope (Cloud Inference)</option>
                                <option value="sensenova">SenseNova (Compatible Mode)</option>
                                <option value="ollama">Ollama (Local)</option>
                                <option value="openai_api">Custom OpenAI API</option>
                            </select>
                        </div>

                        <!-- Model Configuration -->
                        <div class="form-group">
                            <label for="model">Vision Model</label>
                            <input type="text" id="model" name="model" value="{{ default_model }}" placeholder="{{ default_model }}">
                        </div>

                        <!-- Client-specific settings -->
                        <div id="ollamaSettings" class="full-width">
                            <div class="form-group">
                                <label for="ollama-url">Ollama Endpoint</label>
                                <input type="text" id="ollama-url" name="ollama-url" value="http://localhost:11434">
                            </div>
                        </div>

                        <div id="openaiSettings" class="full-width">
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label for="api-key">API Key</label>
                                <input type="password" id="api-key" name="api-key">
                            </div>
                            <div class="form-group">
                                <label for="api-url">Base URL</label>
                                <input type="text" id="api-url" name="api-url" placeholder="https://api.openai.com/v1">
                            </div>
                        </div>

                        <!-- Processing Options -->
                        <div class="form-group full-width">
                            <label for="prompt">Analysis Focus</label>
                            <textarea id="prompt" name="prompt" placeholder="例如：重点分析人物关系变化；只关注画面中的字幕和标语...."></textarea>
                            <p style="color: var(--accent); font-size: 0.8rem; margin-top: 0.5rem;">可选。适合填写：重点分析人物关系变化；只关注画面中的字幕和标语....</p>
                        </div>
                    </div>

                    <div style="margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <span>Analyze Video</span>
                        </button>
                    </div>
                </form>
            </section>

            <!-- Output Section -->
            <section class="output-section" id="outputSection" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="font-size: 1.5rem;">Live Analysis Console</h2>
                    <div id="statusIndicator" style="display: none;">
                        <div class="loader"></div>
                        <span style="color: var(--accent); font-weight: 600;">Processing...</span>
                    </div>
                </div>
                <div class="console-wrapper">
                    <div id="outputText"></div>
                </div>
                <div class="output-actions" style="display: none; margin-top: 2rem;">
                    <button id="downloadResults" class="btn" style="background: var(--border); color: white;">Download JSON</button>
                    <button id="newAnalysis" class="btn btn-primary" style="width: auto;">Restart</button>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
